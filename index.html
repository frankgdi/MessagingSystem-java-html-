<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chat Messaging System</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f2f4f7;
        }

        .login-page {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            width: 360px;
            background-color: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }

        .login-box h1 {
            text-align: center;
            margin-top: 0;
        }

        input {
            box-sizing: border-box;
        }

        .login-box input {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
        }

        button {
            cursor: pointer;
        }

        .login-box button {
            width: 100%;
            padding: 12px;
            background-color: #2f80ed;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
        }

        .error {
            color: red;
            text-align: center;
            margin-top: 10px;
        }

        .app {
            height: 100vh;
            display: none;
            flex-direction: column;
        }

        .header {
            background-color: #2f80ed;
            color: white;
            padding: 18px;
            font-size: 22px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header button {
            padding: 8px 12px;
            border: none;
            border-radius: 8px;
        }

        .main {
            flex: 1;
            display: flex;
            min-height: 0;
        }

        .sidebar {
            width: 340px;
            background-color: white;
            border-right: 1px solid #ddd;
            padding: 15px;
            overflow-y: auto;
        }

        .sidebar h2 {
            font-size: 18px;
            margin-bottom: 10px;
        }

        .input-row {
            display: flex;
            margin-bottom: 10px;
        }

        .input-row input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
        }

        .input-row button {
            margin-left: 6px;
            padding: 10px;
            background-color: #2f80ed;
            color: white;
            border: none;
            border-radius: 8px;
        }

        .create-btn {
            background-color: #27ae60 !important;
        }

        .chat-item {
            padding: 12px;
            margin-bottom: 10px;
            background-color: #f0f2f5;
            border-radius: 8px;
            cursor: pointer;
        }

        .chat-item:hover {
            background-color: #dceeff;
        }

        .chat-item.active {
            background-color: #2f80ed;
            color: white;
        }

        .small-text {
            font-size: 12px;
            color: gray;
            margin-top: 4px;
            line-height: 1.4;
        }

        .chat-item.active .small-text {
            color: white;
        }

        hr {
            border: none;
            border-top: 1px solid #ddd;
            margin: 18px 0;
        }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .chat-title {
            background-color: white;
            padding: 15px;
            border-bottom: 1px solid #ddd;
            font-size: 20px;
            font-weight: bold;
        }

        .messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        .message {
            max-width: 60%;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 12px;
            background-color: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            word-wrap: break-word;
        }

        .message.me {
            margin-left: auto;
            background-color: #dceeff;
        }

        .sender {
            font-weight: bold;
            margin-bottom: 5px;
        }

        .content {
            line-height: 1.4;
        }

        .time {
            font-size: 12px;
            color: gray;
            margin-top: 5px;
        }

        .actions button {
            margin-top: 8px;
            margin-right: 5px;
            padding: 5px 8px;
            border: none;
            border-radius: 5px;
        }

        .edit-btn {
            background-color: #f2c94c;
        }

        .delete-btn {
            background-color: #eb5757;
            color: white;
        }

        .input-area {
            display: flex;
            padding: 15px;
            background-color: white;
            border-top: 1px solid #ddd;
        }

        .input-area input {
            flex: 1;
            padding: 12px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 8px;
        }

        .input-area button {
            margin-left: 10px;
            padding: 12px 20px;
            background-color: #2f80ed;
            color: white;
            border: none;
            border-radius: 8px;
        }

        .notice {
            color: gray;
            text-align: center;
            margin-top: 40px;
        }
    </style>
</head>

<body>
    <div class="login-page" id="loginPage">
        <div class="login-box">
            <h1>Chat Login</h1>
            <input type="text" id="loginName" placeholder="Enter your name">
            <button onclick="login()">Login</button>
            <div class="error" id="loginError"></div>
        </div>
    </div>

    <div class="app" id="app">
        <div class="header">
            <div>Chat / Messaging System</div>
            <div>
                <span id="currentUserDisplay"></span>
                <button onclick="logout()">Logout</button>
            </div>
        </div>

        <div class="main">
            <div class="sidebar">

                <h2>Add Friend</h2>
                <div class="input-row">
                    <input type="text" id="friendNameInput" placeholder="Enter friend's name">
                    <button onclick="addFriend()">Add</button>
                </div>

                <h2>Friends</h2>
                <div id="friendList"></div>

                <hr>

                <h2>Create Group</h2>
                <div class="input-row">
                    <input type="text" id="createGroupInput" placeholder="New group name">
                    <button class="create-btn" onclick="createGroup()">Create</button>
                </div>

                <h2>Join Group</h2>
                <div class="input-row">
                    <input type="text" id="joinGroupInput" placeholder="Enter group name">
                    <button onclick="joinGroupByName()">Join</button>
                </div>

                <div class="small-text">
                    You must know the group name to join.
                </div>

                <hr>

                <h2>My Chats</h2>
                <div id="chatList"></div>
            </div>

            <div class="chat-area">
                <div class="chat-title" id="chatTitle">
                    Select a chat
                </div>

                <div class="messages" id="messages">
                    <div class="notice">Please select a chat.</div>
                </div>

                <div class="input-area">
                    <input type="text" id="messageInput" placeholder="Type your message...">
                    <button onclick="sendMessage()">Send</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "http://127.0.0.1:8000";

        let me = null;
        let nowChatId = null;
        let nowChat = null;
        let chatList = [];

        async function login() {
            const nameBox = document.getElementById("loginName");
            const name = nameBox.value.trim();
            const errorBox = document.getElementById("loginError");

            errorBox.innerText = "";

            if (name === "") {
                errorBox.innerText = "Please enter your name.";
                return;
            }

            try {
                const res = await fetch(`${API_URL}/login`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        name: name
                    })
                });

                const data = await res.json();

                if (!res.ok) {
                    errorBox.innerText = data.detail;
                    return;
                }

                me = data.user;

                document.getElementById("loginPage").style.display = "none";
                document.getElementById("app").style.display = "flex";

                document.getElementById("currentUserDisplay").innerText =
                    "Login as: " + me.name + " ";

                await loadFriends();
                await loadChats();

            } catch (err) {
                errorBox.innerText = "Cannot connect to backend.";
                console.log(err);
            }
        }

        function logout() {
            me = null;
            nowChatId = null;
            nowChat = null;
            chatList = [];

            document.getElementById("loginPage").style.display = "flex";
            document.getElementById("app").style.display = "none";

            document.getElementById("loginName").value = "";
            document.getElementById("friendNameInput").value = "";
            document.getElementById("createGroupInput").value = "";
            document.getElementById("joinGroupInput").value = "";
            document.getElementById("messageInput").value = "";

            document.getElementById("friendList").innerHTML = "";
            document.getElementById("chatList").innerHTML = "";
            document.getElementById("chatTitle").innerText = "Select a chat";

            document.getElementById("messages").innerHTML =
                '<div class="notice">Please select a chat.</div>';
        }

        async function loadFriends() {
            try {
                const res = await fetch(`${API_URL}/friends/${me.user_id}`);
                const friendList = await res.json();

                const friendBox = document.getElementById("friendList");
                friendBox.innerHTML = "";

                if (friendList.length === 0) {
                    friendBox.innerHTML = '<div class="small-text">No friends yet.</div>';
                    return;
                }

                friendList.forEach(function(friend) {
                    const oneFriend = document.createElement("div");
                    oneFriend.className = "chat-item";

                    oneFriend.innerHTML = `
                        <div><strong>${escapeHtml(friend.name)}</strong></div>
                        <div class="small-text">Click to start private chat</div>
                    `;

                    oneFriend.onclick = function() {
                        createPrivateChat(friend.user_id);
                    };

                    friendBox.appendChild(oneFriend);
                });

            } catch (err) {
                console.log(err);
            }
        }

        async function addFriend() {
            const friendNameBox = document.getElementById("friendNameInput");
            const friendName = friendNameBox.value.trim();

            if (friendName === "") {
                alert("Please enter friend's name.");
                return;
            }

            try {
                const res = await fetch(`${API_URL}/friends/add`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        user_id: me.user_id,
                        friend_name: friendName
                    })
                });

                const data = await res.json();

                if (!res.ok) {
                    alert(data.detail);
                    return;
                }

                alert("Friend added successfully.");
                friendNameBox.value = "";

                await loadFriends();

            } catch (err) {
                alert("Cannot add friend.");
                console.log(err);
            }
        }

        async function createPrivateChat(friendId) {
            try {
                const res = await fetch(`${API_URL}/private-chat`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        user_id: me.user_id,
                        friend_id: friendId
                    })
                });

                const data = await res.json();

                if (!res.ok) {
                    alert(data.detail);
                    return;
                }

                await loadChats();
                await switchChat(data.chat.chat_id);

            } catch (err) {
                alert("Cannot create private chat.");
                console.log(err);
            }
        }

        async function createGroup() {
            const groupNameBox = document.getElementById("createGroupInput");
            const groupName = groupNameBox.value.trim();

            if (groupName === "") {
                alert("Please enter group name.");
                return;
            }

            try {
                const res = await fetch(`${API_URL}/groups/create`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        user_id: me.user_id,
                        group_name: groupName
                    })
                });

                const data = await res.json();

                if (!res.ok) {
                    alert(data.detail);
                    return;
                }

                alert("Group created successfully.");
                groupNameBox.value = "";

                await loadChats();
                await switchChat(data.chat.chat_id);

            } catch (err) {
                alert("Cannot create group.");
                console.log(err);
            }
        }

        async function joinGroupByName() {
            const groupNameBox = document.getElementById("joinGroupInput");
            const groupName = groupNameBox.value.trim();

            if (groupName === "") {
                alert("Please enter group name.");
                return;
            }

            try {
                const res = await fetch(`${API_URL}/groups/join-by-name`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        user_id: me.user_id,
                        group_name: groupName
                    })
                });

                const data = await res.json();

                if (!res.ok) {
                    alert(data.detail);
                    return;
                }

                alert("Joined group successfully.");
                groupNameBox.value = "";

                await loadChats();
                await switchChat(data.chat.chat_id);

            } catch (err) {
                alert("Cannot join group.");
                console.log(err);
            }
        }

        async function loadChats() {
            try {
                const res = await fetch(`${API_URL}/chats?user_id=${me.user_id}`);
                chatList = await res.json();

                const chatBox = document.getElementById("chatList");
                chatBox.innerHTML = "";

                if (chatList.length === 0) {
                    chatBox.innerHTML = '<div class="small-text">No chats yet.</div>';
                    return;
                }

                chatList.forEach(function(chat) {
                    const oneChat = document.createElement("div");
                    oneChat.className = "chat-item";

                    if (chat.chat_id === nowChatId) {
                        oneChat.classList.add("active");
                    }

                    oneChat.innerHTML = `
                        <div><strong>${escapeHtml(chat.chat_name)}</strong></div>
                        <div class="small-text">Type: ${chat.chat_type}</div>
                        <div class="small-text">Members: ${escapeHtml(chat.member_names.join(", "))}</div>
                    `;

                    oneChat.onclick = function() {
                        switchChat(chat.chat_id);
                    };

                    chatBox.appendChild(oneChat);
                });

            } catch (err) {
                console.log(err);
            }
        }

        async function switchChat(chatId) {
            nowChatId = chatId;
            nowChat = null;

            for (let i = 0; i < chatList.length; i++) {
                if (chatList[i].chat_id === chatId) {
                    nowChat = chatList[i];
                    break;
                }
            }

            if (nowChat === null) {
                return;
            }

            document.getElementById("chatTitle").innerText = nowChat.chat_name;

            const chatItems = document.querySelectorAll("#chatList .chat-item");

            chatItems.forEach(function(item) {
                item.classList.remove("active");
            });

            const index = chatList.findIndex(chat => chat.chat_id === chatId);

            if (index !== -1 && chatItems[index]) {
                chatItems[index].classList.add("active");
            }

            await loadMessages();
        }

        async function loadMessages() {
            const msgBox = document.getElementById("messages");

            if (nowChatId === null) {
                msgBox.innerHTML = '<div class="notice">Please select a chat.</div>';
                return;
            }

            msgBox.innerHTML = '<div class="notice">Loading messages...</div>';

            try {
                const res = await fetch(`${API_URL}/chats/${nowChatId}/messages`);
                const msgList = await res.json();

                msgBox.innerHTML = "";

                if (msgList.length === 0) {
                    msgBox.innerHTML = '<div class="notice">No messages yet.</div>';
                    return;
                }

                msgList.forEach(function(msg) {
                    const oneMsg = document.createElement("div");

                    if (msg.sender_id === me.user_id) {
                        oneMsg.className = "message me";
                    } else {
                        oneMsg.className = "message";
                    }

                    oneMsg.innerHTML = `
                        <div class="sender">${escapeHtml(msg.sender_name)}</div>
                        <div class="content">${escapeHtml(msg.content)}</div>
                        <div class="time">${escapeHtml(msg.timestamp)}</div>
                    `;

                    if (msg.sender_id === me.user_id && msg.is_deleted === false) {
                        const btnBox = document.createElement("div");
                        btnBox.className = "actions";

                        const editBtn = document.createElement("button");
                        editBtn.className = "edit-btn";
                        editBtn.innerText = "Edit";
                        editBtn.onclick = function() {
                            editMessage(msg.message_id, msg.content);
                        };

                        const deleteBtn = document.createElement("button");
                        deleteBtn.className = "delete-btn";
                        deleteBtn.innerText = "Delete";
                        deleteBtn.onclick = function() {
                            deleteMessage(msg.message_id);
                        };

                        btnBox.appendChild(editBtn);
                        btnBox.appendChild(deleteBtn);
                        oneMsg.appendChild(btnBox);
                    }

                    msgBox.appendChild(oneMsg);
                });

                msgBox.scrollTop = msgBox.scrollHeight;

            } catch (err) {
                msgBox.innerHTML = '<div class="notice">Cannot connect to backend.</div>';
                console.log(err);
            }
        }

        async function sendMessage() {
            const msgInput = document.getElementById("messageInput");
            const text = msgInput.value.trim();

            if (nowChatId === null) {
                alert("Please select a chat first.");
                return;
            }

            if (text === "") {
                alert("Please enter a message.");
                return;
            }

            try {
                const res = await fetch(`${API_URL}/chats/${nowChatId}/messages`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        sender_id: me.user_id,
                        content: text
                    })
                });

                const data = await res.json();

                if (!res.ok) {
                    alert(data.detail);
                    return;
                }

                msgInput.value = "";
                await loadMessages();
                await loadChats();

            } catch (err) {
                alert("Cannot send message.");
                console.log(err);
            }
        }

        async function editMessage(msgId, oldText) {
            const newText = prompt("Edit your message:", oldText);

            if (newText === null || newText.trim() === "") {
                return;
            }

            try {
                const res = await fetch(`${API_URL}/chats/${nowChatId}/messages/${msgId}`, {
                    method: "PUT",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        user_id: me.user_id,
                        new_content: newText.trim()
                    })
                });

                const data = await res.json();

                if (!res.ok) {
                    alert(data.detail);
                    return;
                }

                await loadMessages();

            } catch (err) {
                alert("Cannot edit message.");
                console.log(err);
            }
        }

        async function deleteMessage(msgId) {
            const check = confirm("Are you sure you want to delete this message?");

            if (!check) {
                return;
            }

            try {
                const res = await fetch(
                    `${API_URL}/chats/${nowChatId}/messages/${msgId}?user_id=${me.user_id}`,
                    {
                        method: "DELETE"
                    }
                );

                const data = await res.json();

                if (!res.ok) {
                    alert(data.detail);
                    return;
                }

                await loadMessages();

            } catch (err) {
                alert("Cannot delete message.");
                console.log(err);
            }
        }

        function escapeHtml(text) {
            return String(text)
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
        }

        document.getElementById("loginName").addEventListener("keydown", function(event) {
            if (event.key === "Enter") {
                login();
            }
        });

        document.getElementById("friendNameInput").addEventListener("keydown", function(event) {
            if (event.key === "Enter") {
                addFriend();
            }
        });

        document.getElementById("createGroupInput").addEventListener("keydown", function(event) {
            if (event.key === "Enter") {
                createGroup();
            }
        });

        document.getElementById("joinGroupInput").addEventListener("keydown", function(event) {
            if (event.key === "Enter") {
                joinGroupByName();
            }
        });

        document.getElementById("messageInput").addEventListener("keydown", function(event) {
            if (event.key === "Enter") {
                sendMessage();
            }
        });

        setInterval(function() {
            if (me !== null && nowChatId !== null) {
                loadMessages();
            }
        }, 2000);

        setInterval(function() {
            if (me !== null) {
                loadFriends();
                loadChats();
            }
        }, 5000);
    </script>
</body>
</html>
