<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>Chat Messaging System</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="login-page" id="loginPage">
    <div class="login-box">
        <h1>聊天室登入</h1>

        <input type="text" id="loginNameInput" placeholder="輸入你的名字，例如 Alice">
        <button onclick="login()">登入 / 建立使用者</button>

        <div id="loginMessage"></div>
    </div>
</div>

<div class="main-page" id="mainPage">

    <div class="left">
        <h2>聊天系統</h2>

        <p class="small-text">
            目前使用者：
            <span id="currentUserName"></span>
        </p>

        <div class="section">
            <h3>加好友</h3>
            <input type="text" id="friendNameInput" placeholder="輸入好友名字">
            <button onclick="addFriend()">加好友</button>
            <div id="friendMessage"></div>
        </div>

        <div class="section">
            <h3>好友列表</h3>
            <div id="friendList"></div>
        </div>

        <div class="section">
            <h3>建立群組</h3>
            <input type="text" id="createGroupInput" placeholder="群組名稱">
            <button onclick="createGroup()">建立群組</button>
            <div id="createGroupMessage"></div>
        </div>

        <div class="section">
            <h3>加入群組</h3>
            <input type="text" id="joinGroupInput" placeholder="輸入群組名稱">
            <button onclick="joinGroup()">加入群組</button>
            <div id="joinGroupMessage"></div>
        </div>

        <div class="section">
            <h3>聊天室列表</h3>
            <button onclick="loadChats()">重新整理聊天室</button>
            <div id="chatList"></div>
        </div>
    </div>

    <div class="center">
        <div class="top-bar">
            <h2 id="chatTitle">尚未選擇聊天室</h2>
            <p class="small-text" id="chatInfo">請從左邊選擇聊天室</p>
        </div>

        <div class="chat-area" id="chatArea"></div>

        <div class="bottom-bar">
            <input type="text" id="messageInput" placeholder="輸入訊息">
            <button onclick="sendMessage()">送出</button>
        </div>
    </div>

</div>

<script src="js/api.js"></script>
<script src="js/app.js"></script>

</body>
</html>
